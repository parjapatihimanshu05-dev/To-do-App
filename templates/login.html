<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {font-family: 'Poppins', sans-serif; background:#667eea; display:flex; justify-content:center; align-items:center; height:100vh;}
form {background:white; padding:30px; border-radius:10px;}
input,button{display:block;margin:10px;width:200px;padding:10px;}
</style>
</head>
<body>
<form method="POST">
<h2>Login</h2>
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
<a href="/signup">Create Account</a>
</form>
</body>
</html>
